name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from `packageManager` in package.json — do not
      # also pass `version:` here, pnpm/action-setup@v4 errors on the dual-spec.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from `packageManager` in package.json — do not
      # also pass `version:` here, pnpm/action-setup@v4 errors on the dual-spec.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # API tests hit a real Supabase per ADR-010 / TASKS.md (no in-CI Postgres
      # service container — RLS + auth plugin require the actual Supabase stack).
      # Until a dedicated CI Supabase project is provisioned, this job is gated:
      # if test secrets are absent, we skip with a warning instead of failing.
      - name: Check for test secrets
        id: secrets
        env:
          DB_POOLED: ${{ secrets.CI_DATABASE_URL_POOLED }}
        run: |
          if [ -n "$DB_POOLED" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Tests skipped::CI_DATABASE_URL_POOLED not set; skipping API tests. Add CI_* secrets in repo settings to enable."
          fi

      # The api `test` script is `dotenv -e ../../.env.local -- vitest run`.
      # We materialise that file from secrets only for this step; GitHub masks
      # the values in logs and the runner is ephemeral.
      - name: Materialise .env.local from secrets
        if: steps.secrets.outputs.ready == 'true'
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
          DATABASE_URL_POOLED: ${{ secrets.CI_DATABASE_URL_POOLED }}
          SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.CI_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.CI_SUPABASE_JWT_SECRET }}
        run: |
          {
            echo "NODE_ENV=test"
            echo "DATABASE_URL=$DATABASE_URL"
            echo "DATABASE_URL_POOLED=$DATABASE_URL_POOLED"
            echo "SUPABASE_URL=$SUPABASE_URL"
            echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
            echo "SUPABASE_JWT_SECRET=$SUPABASE_JWT_SECRET"
          } > .env.local

      - name: Test
        if: steps.secrets.outputs.ready == 'true'
        run: pnpm test

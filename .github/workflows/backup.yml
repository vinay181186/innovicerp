name: DB Backup → Backblaze B2

# Daily offsite pg_dump to Backblaze B2 (CLAUDE.md rule #4: daily automated dump
# to a second provider). Runbook design: docs/RUNBOOK.md; go-live: docs/GO_LIVE.md Phase 7.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   BACKUP_DATABASE_URL  — DIRECT Postgres connection string for the prod project
#                          (Supabase → Project Settings → Database → Connection
#                          string → "Direct connection", port 5432. NOT the
#                          transaction pooler — pg_dump needs a direct session.)
#   B2_KEY_ID            — Backblaze application key ID
#   B2_APPLICATION_KEY   — Backblaze application key
#   B2_BUCKET            — target bucket name (e.g. innovic-backups)
#   BACKUP_HEARTBEAT_URL — (optional) Better Stack heartbeat URL pinged on success
#
# Retention: set a 30-day lifecycle rule on the B2 bucket (Backblaze console →
# bucket → Lifecycle Settings → "Keep only the last version" / delete after 30
# days). That is the source of truth for retention; this workflow only uploads.

on:
  schedule:
    # 02:00 IST = 20:30 UTC (IST = UTC+5:30). Runs once daily.
    - cron: '30 20 * * *'
  workflow_dispatch: {} # allow manual "Run workflow" for restore drills / ad-hoc

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    name: pg_dump → B2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install PostgreSQL 15 client
        run: |
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-15

      - name: Install Backblaze B2 CLI
        run: pipx install 'b2<4' # pin to v3 for stable authorize-account / upload-file commands

      - name: Dump database (gzip)
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          set -euo pipefail
          STAMP="$(date -u +%Y%m%d-%H%M)"
          FILE="innovic-${STAMP}.sql.gz"
          echo "FILE=$FILE" >> "$GITHUB_ENV"
          # --no-owner/--no-privileges keep the dump restorable into a fresh
          # Supabase project where roles differ.
          pg_dump --no-owner --no-privileges "$BACKUP_DATABASE_URL" | gzip -9 > "$FILE"
          ls -lh "$FILE"

      - name: Upload to B2
        env:
          B2_APPLICATION_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
        run: |
          set -euo pipefail
          b2 authorize-account "$B2_APPLICATION_KEY_ID" "$B2_APPLICATION_KEY"
          b2 upload-file "$B2_BUCKET" "$FILE" "innovic-erp/$FILE"

      - name: Heartbeat (success)
        if: success()
        env:
          HEARTBEAT: ${{ secrets.BACKUP_HEARTBEAT_URL }}
        run: |
          if [ -n "$HEARTBEAT" ]; then curl -fsS --retry 3 "$HEARTBEAT" || true; fi
